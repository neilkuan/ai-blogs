name: Translate Claude Code Changelog

on:
  schedule:
    - cron: '16 */3 * * *'
  workflow_dispatch: # 手動觸發

permissions:
  contents: write

env:
  UPSTREAM_REPO: anthropics/claude-code
  CHANGELOG_PATH: CHANGELOG.md
  STATE_FILE: .last_processed_version

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Kiro CLI
        run: |
          curl -fsSL https://cli.kiro.dev/install | bash
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: Fetch latest upstream tag
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${UPSTREAM_REPO}/tags?per_page=1" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['name'])")

          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

          # 讀取上次處理的版本
          if [ -f "${STATE_FILE}" ]; then
            LAST_VERSION=$(cat "${STATE_FILE}")
          else
            LAST_VERSION="none"
          fi

          echo "last_version=${LAST_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "${LATEST_TAG}" = "${LAST_VERSION}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No new version. Latest: ${LATEST_TAG}"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "🆕 New version detected: ${LATEST_TAG} (was: ${LAST_VERSION})"
          fi

      - name: Download upstream CHANGELOG (diff only)
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          LAST_TAG: ${{ steps.check.outputs.last_version }}
          LATEST_TAG: ${{ steps.check.outputs.latest_tag }}
        run: |
          if [ "${LAST_TAG}" != "none" ]; then
            echo "📦 Fetching diff between ${LAST_TAG}...${LATEST_TAG}"
            # Use compare API to get only new additions to CHANGELOG.md
            python3 scripts/fetch_changelog_diff.py
          else
            echo "📦 First run — fetching partial CHANGELOG (top 100KB)"
            curl -sfL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw+json" \
              -H "Range: bytes=0-102400" \
              "https://api.github.com/repos/${UPSTREAM_REPO}/contents/${CHANGELOG_PATH}?ref=${LATEST_TAG}" \
              -o upstream_changelog.md
          fi
          wc -c upstream_changelog.md

      - name: Extract & Translate
        if: steps.check.outputs.skip == 'false'
        env:
          TARGET_TAG: ${{ steps.check.outputs.latest_tag }}
          LAST_TAG: ${{ steps.check.outputs.last_version }}
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: python3 scripts/translate.py

      - name: Commit & Push
        if: steps.check.outputs.skip == 'false'
        run: |
          TAG="${{ steps.check.outputs.latest_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG_zh-TW.md "${STATE_FILE}" metadata.json cc/
          git commit -m "chore: translate changelog for ${TAG}" || exit 0
          git push
      - name: Notify Telegram
        if: steps.check.outputs.skip == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TAG="${{ steps.check.outputs.latest_tag }}"
          VERSION="${TAG#v}"
          PAGES_URL="https://neilkuan.github.io/ai-blogs"
          PAGE_LINK="${PAGES_URL}/cc/claude-code-changelog-${VERSION}.html"
          MSG="🆕 Claude Code ${TAG} 更新：${PAGE_LINK}"
          jq -n \
            --arg chat_id "${TELEGRAM_CHAT_ID}" \
            --arg text "${MSG}" \
            '{chat_id: $chat_id, text: $text}' \
          | curl -s -o /dev/null -w "Telegram HTTP %{http_code}\n" \
              -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H 'Content-Type: application/json' \
              -d @-
