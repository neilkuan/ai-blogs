name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate index.html
        run: |
          python3 << 'PYEOF'
          import html as html_mod
          import json, os, pathlib

          meta = {}
          if os.path.exists("metadata.json"):
              with open("metadata.json") as f:
                  meta = json.load(f)

          # Collect root HTML files
          root_files = sorted(
              p.name for p in pathlib.Path(".").glob("*.html")
              if p.name != "index.html"
          )
          # Collect cc/ subdirectory HTML files
          cc_files = sorted(
              str(p) for p in pathlib.Path("cc").glob("*.html")
          ) if pathlib.Path("cc").is_dir() else []

          items = []
          for fname in root_files:
              slug = fname.removesuffix(".html")
              info = meta.get(slug, {})
              title = html_mod.escape(info.get("title", slug))
              desc  = html_mod.escape(info.get("description", ""))
              desc_html = f'<p class="desc">{desc}</p>' if desc else ""
              items.append(
                  f'<li><a href="{html_mod.escape(fname)}"><span class="title">{title}</span>'
                  f'{desc_html}</a></li>'
              )
          for fpath in cc_files:
              slug = pathlib.Path(fpath).stem
              info = meta.get(slug, {})
              title = html_mod.escape(info.get("title", slug))
              desc  = html_mod.escape(info.get("description", ""))
              desc_html = f'<p class="desc">{desc}</p>' if desc else ""
              items.append(
                  f'<li><a href="{html_mod.escape(fpath)}"><span class="title">{title}</span>'
                  f'{desc_html}</a></li>'
              )

          items_html = "\n".join(items)

          html = f"""<!DOCTYPE html>
          <html lang="zh-TW">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>AI Blogs</title>
            <style>
              :root {{
                --bg: #ffffff; --text: #1a1a1a; --sub: #666;
                --border: #eee; --link: #0070f3; --link-hover: #0051a8;
                --card-hover: #f7f9fc;
              }}
              [data-theme=dark] {{
                --bg: #0f0f0f; --text: #e5e5e5; --sub: #999;
                --border: #2a2a2a; --link: #58a6ff; --link-hover: #79b8ff;
                --card-hover: #1a1a1a;
              }}
              * {{ box-sizing: border-box; margin: 0; padding: 0; }}
              body {{ font-family: system-ui, sans-serif; max-width: 800px; margin: 60px auto; padding: 0 24px; color: var(--text); background: var(--bg); transition: background .2s, color .2s; }}
              header {{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }}
              h1 {{ font-size: 2rem; }}
              p.subtitle {{ color: var(--sub); margin-bottom: 40px; }}
              ul {{ list-style: none; }}
              li {{ border-bottom: 1px solid var(--border); }}
              li:last-child {{ border-bottom: none; }}
              a {{ display: block; padding: 18px 0; text-decoration: none; border-radius: 6px; }}
              a:hover {{ background: var(--card-hover); padding-left: 8px; }}
              .title {{ display: block; color: var(--link); font-size: 1.05rem; font-weight: 500; margin-bottom: 4px; }}
              a:hover .title {{ color: var(--link-hover); }}
              .desc {{ color: var(--sub); font-size: 0.9rem; line-height: 1.5; }}
              button#toggle {{
                background: none; border: 1px solid var(--border); color: var(--text);
                padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
                transition: border-color .2s;
              }}
              button#toggle:hover {{ border-color: var(--link); }}
            </style>
          </head>
          <body>
            <header>
              <h1>AI Blogs</h1>
              <button id="toggle" onclick="toggleTheme()">🌙 深色</button>
            </header>
            <p class="subtitle">文章列表</p>
            <ul>
          {items_html}
            </ul>
            <script>
              const btn = document.getElementById('toggle');
              const saved = localStorage.getItem('theme') || 'light';
              setTheme(saved);
              function setTheme(t) {{
                document.documentElement.dataset.theme = t;
                btn.textContent = t === 'dark' ? '☀️ 淺色' : '🌙 深色';
                localStorage.setItem('theme', t);
              }}
              function toggleTheme() {{
                setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
              }}
            </script>
          </body>
          </html>"""

          with open("index.html", "w") as f:
              f.write(html)

          print("Generated index.html with", len(root_files) + len(cc_files), "articles")
          PYEOF

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - uses: actions/deploy-pages@v5
        id: deployment
