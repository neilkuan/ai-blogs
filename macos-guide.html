play:["⌘","空白"],title:"Spotlight 搜尋（最強找東西）",description:"整台 Mac 最重要的快捷！按下後出現搜尋框，可以找檔案、開 App、查單字、算數學、查天氣。",example:"想開計算機？⌘+空白，輸入「計算機」按 Return。",difficulty:"basic"},{id:"delete-file",category:"finder",keys:["cmd","delete"],display:["⌘","⌫"],title:"把檔案丟到垃圾桶",description:"選中檔案後按這個就會丟進垃圾桶。沒有真的刪掉，可以救回來。",difficulty:"basic"},{id:"empty-trash",category:"finder",keys:["cmd","shift","delete"],display:["⌘","⇧","⌫"],title:"清空垃圾桶",description:"把垃圾桶裡的東西通通永久刪除。注意：刪了就回不來了，要確定再按。",difficulty:"intermediate"},{id:"quick-look",category:"finder",keys:["space"],display:["空白鍵"],title:"快速預覽（神功能！）",description:"在 Finder 選好檔案，按一下空白鍵，不用打開程式就能看內容，可以看圖、看 PDF、看影片。",example:"看相片不用一張張點兩下，按空白鍵超快。",difficulty:"basic"},{id:"get-info",category:"finder",keys:["cmd","i"],display:["⌘","I"],title:"顯示檔案資訊",description:"看檔案多大、什麼時候建立的、放在哪個資料夾。",difficulty:"basic"},{id:"new-folder",category:"finder",keys:["cmd","shift","n"],display:["⌘","⇧","N"],title:"建立新資料夾",description:"在現在這個位置建立一個新資料夾，可以馬上幫它取名字。",difficulty:"basic"},{id:"show-hidden",category:"finder",keys:["cmd","shift","period"],display:["⌘","⇧","."],title:"顯示／隱藏隱藏檔案",description:"Mac 有些系統檔案是藏起來的（檔名以「.」開頭）。按這個會把它們秀出來，再按一次又藏起來。",difficulty:"advanced"},{id:"rename-file",category:"finder",keys:["return"],display:["Return"],title:"重新命名（注意是 Return）",description:"和 Windows 不一樣！選中檔案後按 Return（不是 F2），就可以重新命名。",example:"Windows 用 F2，Mac 用 Return，記住這點！",difficulty:"basic"},{id:"duplicate-file",category:"finder",keys:["cmd","d"],display:["⌘","D"],title:"複製一份檔案",description:"選好檔案後按下，會在原地複製出一個一模一樣的（檔名後面會多「副本」）。",difficulty:"intermediate"},{id:"go-to-folder",category:"finder",keys:["cmd","shift","g"],display:["⌘","⇧","G"],title:"前往特定資料夾路徑",description:"在 Finder 裡按下，可以直接輸入路徑（像 ~/Documents）跳過去。",difficulty:"advanced"},{id:"find",category:"text",keys:["cmd","f"],display:["⌘","F"],title:"尋找",description:"在目前這個文件、網頁、PDF 裡搜尋特定文字。長文章找關鍵字必備。",difficulty:"basic"},{id:"find-next",category:"text",keys:["cmd","g"],display:["⌘","G"],title:"找下一個",description:"搜尋之後，按這個跳到下一個符合的字。",d
