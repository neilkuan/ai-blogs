// ======================== STATE ========================
let activeCategory = 'all';
let searchQuery = '';
let expandedCards = new Set();

// ======================== RENDER ========================
function renderPills() {
  const c = document.getElementById('categoryPills');
  const allCount = vars.length;
  let html = `<button data-cat="all" class="category-pill flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition-all ${activeCategory === 'all' ? 'bg-primary text-white active shadow-lg shadow-primary/30' : 'dark:bg-gray-800 bg-gray-200 dark:text-gray-300 text-gray-600 hover:bg-primary/20'}">全部 (${allCount})</button>`;
  categories.forEach(cat => {
    const isActive = activeCategory === cat.id;
    html += `<button data-cat="${cat.id}" class="category-pill flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-all ${isActive ? 'bg-primary text-white active shadow-lg shadow-primary/30' : 'dark:bg-gray-800 bg-gray-200 dark:text-gray-300 text-gray-600 hover:bg-primary/20'}">${cat.icon} ${cat.name}</button>`;
  });
  c.innerHTML = html;
  c.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      renderPills();
      renderVars();
    });
  });
}

function getFiltered() {
  let filtered = vars;
  if (activeCategory !== 'all') filtered = filtered.filter(v => v.cat === activeCategory);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(v =>
      v.name.toLowerCase().includes(q) ||
      v.desc.toLowerCase().includes(q) ||
      v.detail.toLowerCase().includes(q) ||
      v.cat.toLowerCase().includes(q)
    );
  }
  return filtered;
}

function renderVars() {
  const filtered = getFiltered();
  const container = document.getElementById('varsContainer');
  document.getElementById('statsCounter').textContent = `${filtered.length} / ${vars.length} 個變數`;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="text-center py-20 dark:text-gray-500 text-gray-400"><p class="text-5xl mb-4">&#128270;</p><p class="text-lg">沒有找到匹配的環境變數</p><p class="text-sm mt-1">試試其他搜尋關鍵字</p></div>`;
    return;
  }

  // Group by category
  const grouped = {};
  filtered.forEach(v => {
    if (!grouped[v.cat]) grouped[v.cat] = [];
    grouped[v.cat].push(v);
  });

  let html = '';
  const catOrder = categories.map(c => c.id);
  catOrder.forEach(catId => {
    if (!grouped[catId]) return;
    const cat = categories.find(c => c.id === catId);
    html += `<div class="mb-8 fade-in">`;
    html += `<h3 class="text-lg font-poppins font-semibold mb-3 flex items-center gap-2 dark:text-gray-200 text-gray-800"><span class="text-xl">${cat.icon}</span> ${cat.name} <span class="text-xs dark:text-gray-500 text-gray-400 font-normal">(${grouped[catId].length})</span></h3>`;
    html += `<div class="grid grid-cols-1 gap-2">`;
    grouped[catId].forEach(v => {
      const isOpen = expandedCards.has(v.name);
      const badges = v.tags.map(t => {
        if (t === 'deprecated') return `<span class="badge bg-red-500/20 text-red-400 border border-red-500/30">DEPRECATED</span>`;
        if (t === 'experimental') return `<span class="badge bg-amber-500/20 text-amber-400 border border-amber-500/30">EXPERIMENTAL</span>`;
        return '';
      }).join('');
      html += `
        <div class="var-card dark:bg-cardbg bg-white rounded-xl border dark:border-gray-700/50 border-gray-200 dark:hover:border-primary/40 hover:border-primary/40 dark:hover:shadow-lg dark:hover:shadow-primary/5 hover:shadow-md cursor-pointer" data-name="${v.name}">
          <div class="card-header flex items-center justify-between px-4 py-3" data-toggle="${v.name}">
            <div class="flex items-center gap-3 min-w-0">
              <code class="text-sm font-mono font-semibold text-primary flex-shrink-0 truncate max-w-[260px] sm:max-w-none">${v.name}</code>
              ${badges}
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
              <span class="text-xs dark:text-gray-400 text-gray-500 hidden sm:block max-w-[200px] truncate">${v.desc}</span>
              <button class="copy-btn w-7 h-7 rounded-lg dark:bg-gray-700 bg-gray-100 flex items-center justify-center dark:hover:bg-gray-600 hover:bg-gray-200 text-xs" data-copy="${v.name}" title="複製變數名">&#128203;</button>
              <svg class="w-4 h-4 dark:text-gray-500 text-gray-400 transition-transform ${isOpen ? 'rotate-180' : ''}" data-chevron="${v.name}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
          </div>
          <div class="card-expand ${isOpen ? 'open' : ''}" data-body="${v.name}">
            <div class="px-4 pb-3 border-t dark:border-gray-700/50 border-gray-200 pt-3">
              <p class="text-sm dark:text-gray-300 text-gray-600 mb-3">${v.detail}</p>
              <div class="flex flex-wrap gap-3 text-xs">
                <div class="dark:bg-gray-800 bg-gray-50 rounded-lg px-3 py-2 flex items-center gap-2">
                  <span class="dark:text-gray-500 text-gray-400">可用值:</span>
                  <code class="dark:text-accent text-cyan-600">${v.values}</code>
                </div>
                <div class="dark:bg-gray-800 bg-gray-50 rounded-lg px-3 py-2 flex items-center gap-2">
                  <span class="dark:text-gray-500 text-gray-400">範例:</span>
                  <code class="dark:text-green-400 text-green-600">${v.example}</code>
                  <button class="copy-btn w-6 h-6 rounded dark:bg-gray-700 bg-gray-200 flex items-center justify-center dark:hover:bg-gray-600 hover:bg-gray-300 text-[10px]" data-copy="${v.name}=${v.example}" title="複製範例">&#128203;</button>
                </div>
              </div>
              <div class="mt-2">
                <button class="copy-btn text-xs dark:text-gray-400 text-gray-500 dark:hover:text-accent hover:text-cyan-600 transition-colors" data-copy="export ${v.name}=${v.example}">&#128203; 複製 export 指令</button>
              </div>
            </div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
  attachCardEvents();
}

function renderRecipes() {
  const grid = document.getElementById('recipesGrid');
  let html = '';
  recipes.forEach((r, i) => {
    const varsHtml = r.vars.map(v => `<div class="flex items-center gap-2 text-xs"><code class="dark:text-primary text-indigo-600 font-mono">${v.name}</code><span class="dark:text-gray-600 text-gray-300">=</span><code class="dark:text-green-400 text-green-600">${v.val}</code></div>`).join('');
    const copyText = r.vars.map(v => `export ${v.name}="${v.val}"`).join('\n');
    html += `
      <div class="recipe-card dark:bg-cardbg bg-white rounded-xl border dark:border-gray-700/50 border-gray-200 p-5 dark:hover:border-accent/30 hover:border-cyan-400/30 dark:hover:shadow-lg dark:hover:shadow-accent/5 hover:shadow-md">
        <div class="flex items-center justify-between mb-3">
          <h4 class="font-poppins font-semibold flex items-center gap-2"><span class="text-xl">${r.icon}</span> ${r.title}</h4>
          <button class="copy-btn px-2 py-1 rounded-lg dark:bg-gray-700 bg-gray-100 dark:hover:bg-gray-600 hover:bg-gray-200 text-xs" data-copy="${copyText.replace(/"/g, '&quot;')}" title="複製全部">&#128203; 複製全部</button>
        </div>
        <p class="text-xs dark:text-gray-400 text-gray-500 mb-3">${r.desc}</p>
        <div class="space-y-1.5">${varsHtml}</div>
      </div>`;
  });
  grid.innerHTML = html;
  attachCopyEvents(grid);
}

// ======================== EVENTS ========================
function attachCardEvents() {
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.copy-btn')) return;
      const name = el.dataset.toggle;
      const body = document.querySelector(`[data-body="${name}"]`);
      const chevron = document.querySelector(`[data-chevron="${name}"]`);
      if (expandedCards.has(name)) {
        expandedCards.delete(name);
        body.classList.remove('open');
        chevron.classList.remove('rotate-180');
      } else {
        expandedCards.add(name);
        body.classList.add('open');
        chevron.classList.add('rotate-180');
      }
    });
  });
  attachCopyEvents(document.getElementById('varsContainer'));
}

function attachCopyEvents(container) {
  container.querySelectorAll('.copy-btn[data-copy]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const text = btn.dataset.copy;
      navigator.clipboard.writeText(text).then(() => showToast(`已複製: ${text.substring(0, 50)}${text.length > 50 ? '...' : ''}`));
    });
  });
}

function showToast(msg) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast px-4 py-2 rounded-xl dark:bg-gray-800 bg-white border dark:border-gray-700 border-gray-200 text-sm shadow-xl dark:text-gray-200 text-gray-700 max-w-xs truncate';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 1600);
}

// Search
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim();
  renderVars();
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') searchInput.blur();
});

// Theme toggle
const toggle = document.getElementById('themeToggle');
toggle.addEventListener('click', () => {
  document.documentElement.classList.toggle('dark');
});

// Progress bar
window.addEventListener('scroll', () => {
  const h = document.documentElement.scrollHeight - window.innerHeight;
  const pct = h > 0 ? (window.scrollY / h) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
});

// ======================== INIT ========================
renderPills();
renderVars();
renderRecipes();
</script>
</body>
</html>
