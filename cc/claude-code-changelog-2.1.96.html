<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 2.1.96 更新日誌</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        darkbg: '#0f172a',
        cardbg: '#1e293b',
      }
    }
  }
}
</script>
<style>
  body { font-family: 'Noto Sans TC', sans-serif; }
</style>

</head>
<body class="bg-gray-50 dark:bg-darkbg text-gray-900 dark:text-gray-100 min-h-screen transition-colors">
  <div class="max-w-3xl mx-auto px-4 py-12">
    <nav class="mb-8 flex justify-between items-center">
      <a href="index.html" class="text-indigo-600 dark:text-indigo-400 hover:underline text-sm">&larr; 所有版本</a>
      <button id="themeToggle" onclick="toggleTheme()" class="px-3 py-1 text-sm border rounded-full border-gray-300 dark:border-gray-600 hover:border-indigo-500 transition-colors">🌙 深色</button>
    </nav>
    <header class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Claude Code 2.1.96 更新日誌</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm">翻譯自 <a href="https://github.com/anthropics/claude-code/blob/main/CHANGELOG.md" class="text-indigo-600 dark:text-indigo-400 hover:underline">官方 CHANGELOG</a></p>
    </header>
    <article class="bg-white dark:bg-cardbg rounded-2xl p-6 sm:p-8 shadow-lg space-y-3">
<h2 class="text-xl font-bold mt-8 mb-3 text-indigo-800 dark:text-indigo-200 border-b border-gray-200 dark:border-gray-700 pb-2">2.1.96</h2>
<ul class="list-disc list-inside space-y-1 text-gray-700 dark:text-gray-300">
<li>修正使用 <code class="px-1.5 py-0.5 bg-gray-100 dark:bg-gray-800 rounded text-indigo-600 dark:text-indigo-300 text-sm">AWS_BEARER_TOKEN_BEDROCK</code> 或 <code class="px-1.5 py-0.5 bg-gray-100 dark:bg-gray-800 rounded text-indigo-600 dark:text-indigo-300 text-sm">CLAUDE_CODE_SKIP_BEDROCK_AUTH</code> 時，Bedrock 請求失敗且出現 <code class="px-1.5 py-0.5 bg-gray-100 dark:bg-gray-800 rounded text-indigo-600 dark:text-indigo-300 text-sm">403 &quot;Authorization header is missing&quot;</code> 的問題（2.1.94 版本的回歸問題）</li>
</ul>
    </article>
    <footer class="mt-12 text-center text-gray-400 dark:text-gray-500 text-xs">
      此頁面由自動化流程產生，僅供參考。
    </footer>
  </div>
  <script>
    const btn = document.getElementById('themeToggle');
    const saved = localStorage.getItem('theme') || 'light';
    applyTheme(saved);
    function applyTheme(t) {
      document.documentElement.classList.toggle('dark', t === 'dark');
      btn.textContent = t === 'dark' ? '\u2600\uFE0F 淺色' : '\uD83C\uDF19 深色';
      localStorage.setItem('theme', t);
    }
    function toggleTheme() {
      applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
    }
  </script>

</body>
</html>
